[package]
name = "wzk"
version = "0.1.1"


[package.host-dependencies]

[package.run-dependencies]
einops = ">=0.8"
fire = ">=0.7"
jax = ">=0.9.0.1"
jaxtyping = ">=0.3.7"
joblib = ">=1.4"
matplotlib-base = ">=3.10"
msgpack-python = ">=1.1.2,<2"
numpy = ">2.0"
plotly = ">=6.0"
scikit-image = ">=0.24"
scikit-learn = ">=1.5"
scipy = ">=1.15"

[package.build]
backend = { name = "pixi-build-ardx", path = "../ajtools/pixi-build-ardx" }

[tool.ardx]
python_layout = "src"
